name: Run agent

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-agent:
    name: Run agent
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python core/runner.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-results
          path: results/
